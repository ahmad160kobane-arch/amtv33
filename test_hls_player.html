<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار HLS Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1a1a1a;
            color: white;
            padding: 20px;
        }
        video {
            width: 100%;
            max-width: 800px;
            background: black;
            margin: 20px 0;
        }
        .info {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
            max-width: 800px;
        }
        .error {
            background: #ff4444;
            color: white;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
        }
        .success {
            background: #44ff44;
            color: black;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #45a049;
        }
        #log {
            background: #000;
            color: #0f0;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <h1>🎬 اختبار HLS Player</h1>
    
    <div class="info">
        <h3>الاختبار 1: رابط مباشر من VPS</h3>
        <p id="url1">جارٍ جلب الرابط...</p>
        <button onclick="testDirect()">اختبار الرابط المباشر</button>
    </div>

    <video id="video" controls></video>

    <div class="info">
        <h3>📊 السجل (Log)</h3>
        <div id="log"></div>
    </div>

    <script>
        const video = document.getElementById('video');
        const logDiv = document.getElementById('log');
        let hls = null;

        function log(msg, type = 'info') {
            const timestamp = new Date().toLocaleTimeString('ar-EG');
            const color = type === 'error' ? '#ff4444' : type === 'success' ? '#44ff44' : '#0f0';
            logDiv.innerHTML += `<span style="color: ${color}">[${timestamp}] ${msg}</span>\n`;
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(msg);
        }

        async function getStreamUrl() {
            try {
                log('🔄 جارٍ جلب رابط البث من API...');
                const response = await fetch('http://62.171.153.204:8090/api/xtream/stream/xtream_live_273266');
                const data = await response.json();
                log('✅ تم جلب البيانات: ' + JSON.stringify(data, null, 2), 'success');
                
                // بناء الرابط الكامل
                let streamUrl = data.hlsUrl || data.proxyUrl || data.directUrl || '';
                if (streamUrl.startsWith('/')) {
                    streamUrl = 'http://62.171.153.204:8090' + streamUrl;
                }
                
                log('📺 رابط البث: ' + streamUrl, 'success');
                document.getElementById('url1').innerHTML = `<strong>الرابط:</strong> <a href="${streamUrl}" target="_blank" style="color: #4CAF50">${streamUrl}</a>`;
                
                return streamUrl;
            } catch (error) {
                log('❌ خطأ في جلب الرابط: ' + error.message, 'error');
                return null;
            }
        }

        async function testDirect() {
            log('🎬 بدء اختبار البث المباشر...');
            
            const streamUrl = await getStreamUrl();
            if (!streamUrl) {
                log('❌ لا يوجد رابط للاختبار', 'error');
                return;
            }

            // تنظيف Player السابق
            if (hls) {
                log('🧹 تنظيف HLS السابق...');
                hls.destroy();
                hls = null;
            }

            // اختبار HLS.js
            if (Hls.isSupported()) {
                log('✅ HLS.js مدعوم في المتصفح', 'success');
                
                hls = new Hls({
                    debug: true,
                    enableWorker: true,
                    lowLatencyMode: false,
                    startLevel: -1,
                    maxBufferLength: 10,
                    maxMaxBufferLength: 20,
                    manifestLoadingTimeOut: 10000,
                    manifestLoadingMaxRetry: 4,
                    levelLoadingTimeOut: 10000,
                    fragLoadingTimeOut: 20000,
                });

                hls.on(Hls.Events.MANIFEST_LOADING, () => {
                    log('📥 جارٍ تحميل Manifest...');
                });

                hls.on(Hls.Events.MANIFEST_LOADED, (event, data) => {
                    log('✅ تم تحميل Manifest بنجاح!', 'success');
                    log('   - Levels: ' + data.levels.length);
                    log('   - Duration: ' + (data.levels[0]?.details?.totalduration || 'live'));
                });

                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    log('✅ تم تحليل Manifest - جاهز للتشغيل!', 'success');
                    video.play().then(() => {
                        log('▶️ بدأ التشغيل!', 'success');
                    }).catch(err => {
                        log('❌ خطأ في التشغيل: ' + err.message, 'error');
                    });
                });

                hls.on(Hls.Events.LEVEL_LOADED, (event, data) => {
                    log('📊 Level loaded - Fragments: ' + data.details.fragments.length);
                });

                hls.on(Hls.Events.FRAG_LOADING, (event, data) => {
                    log('⬇️ جارٍ تحميل Fragment: ' + data.frag.sn);
                });

                hls.on(Hls.Events.FRAG_LOADED, (event, data) => {
                    log('✅ تم تحميل Fragment: ' + data.frag.sn + ' (' + Math.round(data.frag.duration) + 's)');
                });

                hls.on(Hls.Events.ERROR, (event, data) => {
                    log('❌ خطأ HLS: ' + data.type + ' - ' + data.details, 'error');
                    if (data.fatal) {
                        log('💀 خطأ فادح! النوع: ' + data.type, 'error');
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                log('🔄 محاولة إعادة الاتصال...', 'error');
                                hls.startLoad();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                log('🔄 محاولة إصلاح خطأ الميديا...', 'error');
                                hls.recoverMediaError();
                                break;
                            default:
                                log('💥 خطأ غير قابل للإصلاح', 'error');
                                hls.destroy();
                                break;
                        }
                    }
                });

                log('🔗 ربط HLS بالفيديو...');
                hls.loadSource(streamUrl);
                hls.attachMedia(video);
                
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                log('✅ HLS مدعوم أصلياً (Safari)', 'success');
                video.src = streamUrl;
                video.play().then(() => {
                    log('▶️ بدأ التشغيل!', 'success');
                }).catch(err => {
                    log('❌ خطأ في التشغيل: ' + err.message, 'error');
                });
            } else {
                log('❌ HLS غير مدعوم في هذا المتصفح', 'error');
            }
        }

        // اختبار تلقائي عند تحميل الصفحة
        window.onload = () => {
            log('🚀 تم تحميل الصفحة - جاهز للاختبار');
            log('📱 المتصفح: ' + navigator.userAgent);
            log('🌐 HLS.js Version: ' + Hls.version);
            
            // جلب الرابط تلقائياً
            getStreamUrl();
        };

        // معالجة أحداث الفيديو
        video.addEventListener('loadstart', () => log('📺 Video: loadstart'));
        video.addEventListener('loadedmetadata', () => log('📺 Video: loadedmetadata'));
        video.addEventListener('loadeddata', () => log('📺 Video: loadeddata'));
        video.addEventListener('canplay', () => log('✅ Video: canplay', 'success'));
        video.addEventListener('playing', () => log('▶️ Video: playing', 'success'));
        video.addEventListener('waiting', () => log('⏳ Video: waiting (buffering)'));
        video.addEventListener('error', (e) => log('❌ Video error: ' + e.message, 'error'));
    </script>
</body>
</html>
