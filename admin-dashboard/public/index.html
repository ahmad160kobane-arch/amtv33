<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MA Streaming - لوحة التحكم</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
<link href="https://cdn.jsdelivr.net/npm/lucide-static@latest/font/lucide.min.css" rel="stylesheet">
<link rel="stylesheet" href="/style.css?v=4">
</head>
<body>
<!-- Login Screen -->
<div id="login-screen" class="login-screen">
  <div class="login-card">
    <div class="login-logo">🎬</div>
    <h1>MA Streaming</h1>
    <p>لوحة تحكم الإدارة</p>
    <form id="login-form">
      <input type="text" id="login-user" placeholder="اسم المستخدم" required autocomplete="username">
      <input type="password" id="login-pass" placeholder="كلمة المرور" required autocomplete="current-password">
      <button type="submit" id="login-btn">تسجيل الدخول</button>
      <div id="login-error" class="error-msg hidden"></div>
    </form>
  </div>
</div>

<!-- Main App -->
<div id="app" class="app hidden">
  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <span class="logo-icon">🎬</span>
      <span class="logo-text">MA Admin</span>
      <button id="sidebar-close" class="sidebar-close">&times;</button>
    </div>
    <nav class="sidebar-nav">
      <a href="#" data-page="overview" class="nav-item active"><i data-lucide="layout-dashboard"></i><span>نظرة عامة</span></a>
      <a href="#" data-page="users" class="nav-item"><i data-lucide="users"></i><span>المستخدمين</span></a>
      <a href="#" data-page="agents" class="nav-item"><i data-lucide="user-check"></i><span>الوكلاء</span></a>
      <a href="#" data-page="channels" class="nav-item"><i data-lucide="tv"></i><span>القنوات</span></a>
      <a href="#" data-page="iptv" class="nav-item"><i data-lucide="satellite"></i><span>حسابات IPTV</span></a>
      <a href="#" data-page="lulu" class="nav-item"><i data-lucide="upload-cloud"></i><span>محتوى IPTV و Lulu</span></a>
      <a href="#" data-page="cloud" class="nav-item"><i data-lucide="cloud"></i><span>السيرفر السحابي</span></a>
      <a href="#" data-page="logs" class="nav-item"><i data-lucide="file-text"></i><span>السجلات</span></a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="sidebar-avatar">A</div>
        <div class="user-details">
          <span id="sidebar-username">admin</span>
          <span class="user-role">مدير</span>
        </div>
      </div>
      <button id="logout-btn" class="logout-btn">خروج</button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <header class="topbar">
      <button id="menu-toggle" class="menu-toggle">☰</button>
      <h2 id="page-title">نظرة عامة</h2>
      <div class="topbar-actions">
        <span id="topbar-status" class="status-badge online">متصل</span>
      </div>
    </header>
    <div id="page-content" class="page-content"></div>
  </main>
</div>

<!-- Toast -->
<div id="toast-container" class="toast-container"></div>

<!-- Modal -->
<div id="modal-overlay" class="modal-overlay hidden">
  <div id="modal-content" class="modal-content"></div>
</div>

<script src="/app.js?v=4"></script>
</body>
</html>
